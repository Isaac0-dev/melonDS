name: Windows

on:
  push:
    branches:
      - master
      - ci/*
  pull_request:
    branches:
      - master

env:
  MELONDS_GIT_BRANCH: ${{ github.ref }}
  MELONDS_GIT_HASH: ${{ github.sha }}
  MELONDS_BUILD_PROVIDER: GitHub Actions

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        arch:
          - name: x86_64
            image: windows-2025-vs2026
          - name: arm64
            image: windows-11-arm
    name: ${{ matrix.arch.name }}
    runs-on: ${{ matrix.arch.image }}
    timeout-minutes: 150
    steps:
    - name: Check out sources
      uses: actions/checkout@v6

    # This step completely eliminates the faulty Strawberry Perl ccache binary
    - name: Remove interfering Strawberry Perl ccache
      run: |
        if (Test-Path "C:\Strawberry\c\bin\ccache.exe") {
          Remove-Item "C:\Strawberry\c\bin\ccache.exe" -Force
          Write-Output "Successfully removed broken Strawberry ccache binary."
        }
      shell: powershell

    - name: Restore vcpkg cache
      uses: actions/cache/restore@v4
      with:
        submodules: recursive
        path: ${{ github.workspace }}/vcpkg_cache
        key: vcpkg-${{ matrix.arch.name }}-windows-${{ hashFiles('vcpkg.json') }}
        restore-keys: vcpkg-${{ matrix.arch.name }}-windows-

    - name: Set up vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgJsonGlob: vcpkg.json

    - name: Build
      uses: lukka/run-cmake@v10
      with:
        configurePreset: release-windows-${{ matrix.arch.name }}
        configurePresetAdditionalArgs: "['-DENABLE_DEBUG_DEPS=OFF', '-DMELONDS_EMBED_BUILD_INFO=ON']"
        buildPreset: release-windows-${{ matrix.arch.name }}

    - uses: actions/upload-artifact@v7
      with:
        name: melonDS-windows-${{ matrix.arch.name }}
        path: .\build\release-windows-${{ matrix.arch.name }}\melonDS.exe

    - name: Save vcpkg cache
      uses: actions/cache/save@v4
      with:
        path: ${{ github.workspace }}/vcpkg_cache
        key: vcpkg-${{ matrix.arch.name }}-windows-${{ hashFiles('vcpkg.json') }}
